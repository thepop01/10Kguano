<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10kGuano</title>
    <link rel="stylesheet" href="styles/main.css?v=2">
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page">
        <div class="landing-content">
            <img src="assets/banner.jpg" alt="Banner" class="landing-banner">
            <h1 class="landing-title">The10KSquad</h1>
            
            <div class="landing-split">
                <!-- Left side: Name input & Play -->
                <div class="landing-actions">
                    <input type="text" id="player-name-input" placeholder="Enter your name to play..." autocomplete="off">
                    <div id="start-game-btn" class="game-thumbnail">
                        <img src="assets/background.png" alt="Game Thumbnail">
                        <div class="play-overlay">
                            <span>▶ PLAY</span>
                        </div>
                    </div>
                </div>

                <!-- Right side: Leaderboard -->
                <div id="leaderboard-container">
                    <h2 class="lb-header">Top Squads</h2>
                    <div id="leaderboard-list">
                        <div class="lb-loading">Loading top squads...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Container (Hidden initially) -->
    <div id="game-container" class="hidden">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="score-display">Score: 0</div>
            <div id="health-display">Health: ❤️❤️❤️</div>
            <div id="message-overlay" class="hidden">
                <div id="message-text"></div>
                <div id="message-subtext"></div>
                <div id="restart-hint">Press R or tap to restart</div>
            </div>
        </div>
    </div>
    <script type="module" src="js/game.js?v=9"></script>
</body>
</html>
